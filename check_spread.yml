name: Check BTC/ETH spread

on:
  schedule:
    - cron: "*/15 * * * *"   # каждые 15 минут (GitHub Actions не гарантирует ровно 5 мин)
  workflow_dispatch:          # позволяет запускать вручную кнопкой на GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python spread_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
